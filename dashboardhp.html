<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | GeoSMART</title>

    <!-- Bootstrap & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * { font-family: 'Segoe UI', sans-serif; }

        body {
            margin: 0;
            background: 
                linear-gradient(rgba(10, 15, 30, 0.8), rgba(10, 15, 30, 0.9)), 
                url('assets/images/background1.png') center/cover no-repeat fixed;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            padding: 30px 60px;
            background: transparent;
        }

        .logo-img {
            width: 50px; 
            height: auto;
        }

        /* USER PROFILE DROPDOWN */
        .user-profile {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            cursor: pointer;
            border: none;
            color: white;
            transition: 0.3s;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .dropdown-toggle::after { display: none; }

        .dropdown-menu {
            background: white;
            border-radius: 12px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 0;
            min-width: 180px;
            margin-top: 10px !important;
        }

        .dropdown-item {
            padding: 12px 20px;
            font-size: 14px;
            color: #6c757d;
        }

        .dropdown-item.greeting {
            border-bottom: 1px solid #eee;
            cursor: default;
        }

        .dropdown-item.logout {
            color: #ff4d4d;
            font-weight: 600;
        }

        .dropdown-item.logout:hover {
            background: #fff5f5;
            color: #ff0000;
        }

        /* HERO CONTENT */
        .hero-section {
            padding: 40px 60px;
            text-align: center;
            flex-grow: 1;
        }

        .hello-tag {
            color: #FFB800;
            font-weight: 800;
            letter-spacing: 3px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .desc {
            max-width: 700px;
            margin: 0 auto 50px auto;
            font-size: 1.2rem;
            color: #ffffff;
            line-height: 1.6;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* CARDS */
        .card-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            padding-bottom: 50px;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
        }

        .edu-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            padding: 45px 35px;
            width: 300px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .edu-card:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-15px);
            border-color: #FFB800;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 25px auto;
        }

        .blue-icon { background: #00bfff; color: white; box-shadow: 0 5px 15px rgba(0, 191, 255, 0.4); }
        .orange-icon { background: #f59e0b; color: white; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4); }

        .edu-card h3 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; color: white; }
        .edu-card p { font-size: 1rem; color: rgba(255, 255, 255, 0.8); margin: 0; }

    /* ... (Kode CSS bagian atas tetap sama) ... */

    /* --- REVISI BAGIAN MEDIA QUERY --- */
    @media (max-width: 768px) {
        body { 
            overflow-y: auto; 
            height: auto; 
            padding-bottom: 50px; 
        }

        /* Selector disamakan dengan HTML kamu yaitu .hero-section */
        .hero-section { 
            padding: 100px 20px 40px !important; 
        }

        /* Mengatur judul agar mengecil secara efektif */
        .hero-section h1 { 
            font-size: 2rem !important; /* Gunakan 2rem agar pas, jangan 0.1rem */
            font-weight: 800;
            margin-bottom: 10px;
        }

        .hello-tag {
            font-size: 12px;
            letter-spacing: 2px;
        }

        .desc {
            font-size: 1rem;
            padding: 0 10px;
        }

@media (max-width: 768px) {
    /* ... kode lainnya ... */

    .card-container { 
        display: grid !important;
        /* Ini kunci utamanya: repeat(2, 1fr) membuat 2 kolom sama lebar */
        grid-template-columns: repeat(2, 1fr); 
        /* align-items: stretch memastikan tinggi kartu kiri & kanan selalu sama */
        align-items: stretch; 
        gap: 15px; 
        padding: 0 15px;
    }

    .edu-card {
        width: 100% !important; /* Biarkan grid yang mengatur lebarnya */
        height: 100%; /* Paksa tinggi penuh sesuai container */
        display: flex;
        flex-direction: column;
        justify-content: center; /* Agar konten tetap di tengah secara vertikal */
        padding: 30px 10px;
    }

    /* Tambahkan ini agar teks deskripsi punya ruang yang sama */
    .edu-card p {
        min-height: 40px; /* Memberi ruang cadangan agar kartu tidak menclok */
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1.2;
    }
}

        .icon-box {
            width: 50px;
            height: 50px;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .edu-card h3 { 
            font-size: 1.2rem; 
        }

        .edu-card p { 
            font-size: 0.7rem; 
        }

        .navbar {
            padding: 15px 25px;
        }
    }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container-fluid p-0 d-flex justify-content-between align-items-center">
            <img src="assets/images/logogeo.png" alt="Logo GeoSMART" class="logo-img">
            
            <div class="dropdown">
                <button class="user-profile dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fa-solid fa-user"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><span class="dropdown-item greeting">Halo, Student</span></li>
                    <li><a class="dropdown-item logout" href="logout.html">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="hero-section">
        <div class="hello-tag">HELLO STUDENTS</div>
        <h1>WELCOME TO GeoSMART</h1>
        <p class="desc">Jelajahi dunia geometri dengan visualisasi 3D yang interaktif. Pilih materi di bawah untuk mulai belajar.</p>

        <div class="card-container">
            <!-- Card Balok -->
            <a href="balokhp.html" class="card-link">
                <div class="card edu-card">
                    <div class="icon-box blue-icon">
                        <i class="fa-solid fa-cube"></i>
                    </div>
                    <h3>Balok</h3>
                    <p>Rusuk • Volume • Jaring</p>
                </div>
            </a>

            <!-- Card Latihan -->
            <a href="latihanhp.html" class="card-link">
                <div class="card edu-card">
                    <div class="icon-box orange-icon">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </div>
                    <h3>Latihan</h3>
                    <p>Soal • Kuis • Evaluasi</p>
                </div>
            </a>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
