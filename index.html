<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GeoSMART</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 20px rgba(56, 189, 248, 0.05);
            text-align: center;
        }

        /* Styling Logo */
        .logo-box {
            margin-bottom: 15px;
        }
        
        .logo-img {
            max-width: 70px;
            height: auto;
            filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.6));
        }

        /* PERBAIKAN TULISAN GeoSMART */
        .auth-card h3 {
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 35px;
            letter-spacing: -1px;
            background: linear-gradient(180deg, #FFFFFF 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Styling Input - Disesuaikan dengan gambar */
        .form-control {
            background: rgba(226, 232, 240, 0.9) !important; /* Warna agak kebiruan terang seperti di gambar */
            border: none;
            color: #1e293b !important;
            border-radius: 14px;
            padding: 14px 18px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: #ffffff !important;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.3);
            transform: translateY(-2px);
        }

        .form-control::placeholder {
            color: #64748b;
        }

        /* Styling Button */
        .btn-info {
            background: #38bdf8;
            border: none;
            color: #0f172a;
            padding: 14px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn-info:hover {
            background-color: #7dd3fc;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        .switch {
            margin-top: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            color: #94a3b8;
        }

        .switch b {
            color: #38bdf8;
            text-decoration: none;
        }

        .switch b:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="auth-card">
    <div class="logo-box">
        <img src="assets/images/logogeo.png" alt="GeoSMART Logo" class="logo-img">
    </div>

    <h3 id="title">GeoSMART</h3>

    <form id="formLogin" onsubmit="login(event)">
        <input class="form-control mb-3" placeholder="Nama Pengguna" id="user" required>
        <input class="form-control mb-4" placeholder="Password" type="password" id="pass" required>
        <button class="btn btn-info w-100">MASUK</button>
    </form>

    <form id="formDaftar" onsubmit="daftar(event)" style="display:none">
        <input class="form-control mb-3" placeholder="Username Baru" id="newUser" required>
        <input class="form-control mb-4" placeholder="Password" type="password" id="newPass" required>
        <button class="btn btn-info w-100" style="background: #10b981;">DAFTAR SEKARANG</button>
    </form>

    <div class="switch" onclick="toggleForm()" id="switchText">
        Belum punya akun? <b>Daftar</b>
    </div>
</div>

<script>
function toggleForm(){
    let login = document.getElementById("formLogin");
    let daftar = document.getElementById("formDaftar");
    let title = document.getElementById("title");
    let switchText = document.getElementById("switchText");

    if(login.style.display == "none"){
        login.style.display = "block";
        daftar.style.display = "none";
        title.style.background = "linear-gradient(180deg, #FFFFFF 0%, #38bdf8 100%)";
        title.innerText = "GeoSMART";
        switchText.innerHTML = "Belum punya akun? <b>Daftar</b>";
    } else {
        login.style.display = "none";
        daftar.style.display = "block";
        title.innerText = "DAFTAR";
        switchText.innerHTML = "Sudah punya akun? <b>Login</b>";
    }
}

function daftar(e){
    e.preventDefault();
    let u = document.getElementById("newUser").value;
    let p = document.getElementById("newPass").value;
    localStorage.setItem("akun", JSON.stringify({user:u, pass:p}));
    alert("Pendaftaran berhasil! Silakan login.");
    toggleForm();
}

function login(e){
    e.preventDefault();
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;
    let akun = JSON.parse(localStorage.getItem("akun"));

    if(!akun || akun.user !== u || akun.pass !== p){
        alert("Nama pengguna atau password salah!");
        return;
    }

    localStorage.setItem("login", u);
    location.href = "dashboard.html";
}
</script>

</body>
</html>
