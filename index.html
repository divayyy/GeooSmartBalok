<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GeoSMART</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            /* PATH BACKGROUND YANG DIUBAH */
            background-image: url('assets/images/background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Overlay gelap agar background tidak terlalu terang */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(8, 18, 38, 0.85); 
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 2;
            background-color: rgba(22, 36, 71, 0.95);
            width: 100%;
            max-width: 380px;
            padding: 45px 35px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container img {
            width: 110px;
            margin-bottom: 15px;
        }

        h1 {
            color: white;
            font-size: 26px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            background-color: #24345b;
            border: 1px solid #3d4b7a;
            border-radius: 12px;
            color: white;
            margin-bottom: 20px;
            outline: none;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button:hover {
            background-color: #1d4ed8;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="assets/images/logogeo.png" alt="Logo">
        </div>

        <h1>GeoSMART</h1>
        <p>Masukkan nama anda untuk mulai belajar</p>

<!-- Bagian Form yang telah diperbarui -->
<form id="loginForm">
    <input type="text" id="username" placeholder="Nama Pengguna" required>
    
    <select id="deviceType" required style="width: 100%; padding: 14px; background-color: #24345b; border: 1px solid #3d4b7a; border-radius: 12px; color: white; margin-bottom: 20px; outline: none; font-size: 15px;">
        <option value="" disabled selected>Pilih Perangkat</option>
        <option value="hp">Handphone (HP)</option>
        <option value="laptop">Laptop / PC</option>
    </select>

    <button type="submit">Masuk Sekarang</button>
</form>

<script>

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        // Mencegah form reload otomatis
        e.preventDefault();

        // Ambil data dari input
        const name = document.getElementById('username').value;
        const device = document.getElementById('deviceType').value;

        // Simpan nama (agar bisa dipanggil di dashboard mana pun)
        localStorage.setItem('userName', name);

        // Logika Pengalihan Halaman
        if (device === 'hp') {
            // Jika pilih HP, pergi ke dashboardhp.html
            window.location.href = 'dashboardhp.html';
        } else {
            // Jika pilih Laptop, pergi ke dashboard.html
            window.location.href = 'dashboard.html';
        }
    });

</script>
    </div>

</body>
</html>
