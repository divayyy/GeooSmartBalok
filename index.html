<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GeoSMART</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 20px rgba(56, 189, 248, 0.05);
            text-align: center;
        }

        .logo-box {
            margin-bottom: 20px;
        }
        
        .logo-img {
            max-width: 80px;
            height: auto;
            filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.6));
        }

        .auth-card h3 {
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
            background: linear-gradient(180deg, #FFFFFF 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .form-control {
            background: rgba(226, 232, 240, 0.9) !important;
            border: none;
            color: #1e293b !important;
            border-radius: 14px;
            padding: 16px 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 1.1rem;
        }

        .form-control:focus {
            background: #ffffff !important;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.3);
            transform: translateY(-2px);
        }

        .btn-info {
            background: #38bdf8;
            border: none;
            color: #0f172a;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn-info:hover {
            background-color: #7dd3fc;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-box">
        <img src="assets/images/logogeo.png" alt="Logo" class="logo-img">
    </div>

    <h3>GeoSMART</h3>
    <p class="subtitle">Silakan masukkan nama Kamu</p>

    <form onsubmit="mulaiBelajar(event)">
        <input class="form-control mb-4" placeholder="masukkan nama anda" id="userName" required autocomplete="off">
        <button type="submit" class="btn btn-info w-100">MULAI BELAJAR</button>
    </form>
</div>

<script>
function mulaiBelajar(e){
    e.preventDefault();
    let nama = document.getElementById("userName").value;

    if(nama.trim().length < 2) {
        alert("Harap masukkan nama yang valid ya!");
        return;
    }

    // Simpan nama di localStorage agar bisa dipanggil di Dashboard
    localStorage.setItem("login", nama);
    
    // Langsung pindah ke halaman utama
    location.href = "dashboard.html";
}
</script>

</body>
</html>
